# -----------------------------------------------------------------------------
# Environmental Control System (SCA) — Development
# -----------------------------------------------------------------------------
# Start database only:  docker compose up -d db
# Stop:                 docker compose down
# Override credentials: copy docker-compose.env.example to .env (do not commit .env)
# -----------------------------------------------------------------------------

services:
  db:
    image: mysql:8.0
    container_name: sca-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sca_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sistema_controlo_ambiental2}
      MYSQL_USER: ${MYSQL_USER:-sca}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sca_dev}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - sca_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psca_root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  sca_mysql_data:
