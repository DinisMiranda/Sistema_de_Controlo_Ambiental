<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCA — Salas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="Css/sca-theme.css" />
  <link rel="stylesheet" href="Css/style.css" />
  <link rel="stylesheet" href="Css/departamento.css" />
  <script src="Js/config.js"></script>
  <script src="Js/session.js" defer></script>
  <script src="Js/layout.js" defer></script>
  <script src="Js/departamento.js" defer></script>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-box"><i class="ti ti-leaf" aria-hidden="true"></i></div>
      <div>
        <div class="logo-name">SCA</div>
        <div class="logo-ver">v2.1.0</div>
      </div>
    </div>
    <nav>
      <div class="nav-sect">overview</div>
      <a class="nav-item" data-nav="dashboard" href="dashboard.html"><i class="ti ti-layout-dashboard"></i>Dashboard</a>
      <a class="nav-item active" data-nav="salas" href="departamento.html"><i class="ti ti-building"></i>Salas</a>
      <div class="nav-sect">controlo</div>
      <a class="nav-item" data-nav="relatorios" href="relatorio.html"><i class="ti ti-file-analytics"></i>Relatórios</a>
      <div class="nav-sect">sistema</div>
      <a class="nav-item" data-nav="sistema" href="sistema.html"><i class="ti ti-shield-check"></i>Sistema</a>
      <a class="nav-item admin-link" data-nav="admin" href="admin.html"><i class="ti ti-users"></i>Admin</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user">
        <div class="ava" id="user-initials">?</div>
        <div>
          <div class="uname" id="user-name">—</div>
          <div class="urole" id="user-role">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="page-ttl">Salas</div>
        <div class="page-ts" id="timestamp">—</div>
      </div>
      <div class="tb-right">
        <button class="tb-btn" type="button" title="Sair" aria-label="Sair" id="logout-btn"><i class="ti ti-logout"></i></button>
      </div>
    </header>

    <div class="body">
      <header class="page-header">
        <div class="header-content">
          <h1 class="page-title">Departamentos</h1>
          <p class="page-subtitle">Visão geral de todas as salas e ambientes</p>
        </div>
        <div class="header-stats">
          <div class="stat-item">
            <span class="stat-value" id="total-rooms">—</span>
            <span class="stat-label">Salas</span>
          </div>
          <div class="stat-item">
            <span class="stat-value status-ok" id="rooms-ok">—</span>
            <span class="stat-label">Normal</span>
          </div>
          <div class="stat-item">
            <span class="stat-value status-warning" id="rooms-warning">—</span>
            <span class="stat-label">Atenção</span>
          </div>
          <div class="stat-item">
            <span class="stat-value status-alert" id="rooms-alert">—</span>
            <span class="stat-label">Alerta</span>
          </div>
        </div>
      </header>

      <div class="filters-container">
        <button class="filter-btn active" data-filter="all"><i class="ti ti-layout-grid"></i> Todos</button>
        <button class="filter-btn filter-temperature" data-filter="temperature"><i class="ti ti-temperature"></i> Temperatura</button>
        <button class="filter-btn filter-humidity" data-filter="humidity"><i class="ti ti-droplet"></i> Humidade</button>
        <button class="filter-btn filter-light" data-filter="light"><i class="ti ti-bulb"></i> Iluminação</button>
      </div>

      <div class="departments-grid" id="departments-grid"></div>

      <div class="no-results" id="no-results" style="display: none">
        <i class="ti ti-search" style="font-size:48px;color:var(--txt3)"></i>
        <h3>Nenhuma sala encontrada</h3>
        <p>Não há salas com alertas nesta categoria</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
