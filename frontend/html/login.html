<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCA — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="Css/sca-theme.css" />
  <link rel="stylesheet" href="Css/style.css" />
  <script src="Js/config.js"></script>
  <script src="Js/auth.js" defer></script>
</head>
<body>
  <div class="login-page">
    <div class="login-left">
      <div class="login-brand">
        <div class="logo-box"><i class="ti ti-leaf" aria-hidden="true"></i></div>
        <h1>SCA</h1>
        <p>Sistema de Controlo Ambiental</p>
        <span class="login-tag">Edifícios Inteligentes</span>
      </div>
    </div>

    <div class="login-right">
      <div class="login-card">
        <h2>Entrar</h2>
        <p class="login-sub">Aceda ao painel de monitorização</p>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@exemplo.pt" required />
          </div>
          <div class="form-group">
            <label for="password">Palavra-passe</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn-primary">Entrar</button>
        </form>
        <p id="login-error" class="error-msg hidden"></p>
      </div>
    </div>
  </div>
</body>
</html>
